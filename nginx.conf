server {
    listen 80 default_server;
    server_name api.openclawagent.net;

    access_log /var/log/nginx/docs-qa-access.log;
    error_log  /var/log/nginx/docs-qa-error.log notice;

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name api.openclawagent.net;

    access_log /var/log/nginx/docs-qa-access.log;
    error_log  /var/log/nginx/docs-qa-error.log notice;

    ssl_certificate     /home/ops/srv/keys/api.openclawagent.net.pem;
    ssl_certificate_key /home/ops/srv/keys/api.openclawagent.net.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # 如需强制 HSTS（确认全站只走 https 后再开）
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location /api/ask {
        proxy_pass http://127.0.0.1:4000;

        # Hono SSE 用 Transfer-Encoding: chunked，必须 HTTP/1.1
        proxy_http_version 1.1;

        # 清空 Connection（不要 upgrade，不要 close）
        proxy_set_header Connection '';

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 关闭所有缓冲——SSE 必须逐字节透传
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_cache off;

        # 不压缩 text/event-stream，否则浏览器拿不到增量数据
        gzip off;

        # LLM 调用可能很慢，超时拉到 1 小时
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}